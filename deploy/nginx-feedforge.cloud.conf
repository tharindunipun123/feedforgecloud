# STEP 1 — Use this FIRST (HTTP only, before SSL exists)
# sudo cp deploy/nginx-feedforge.cloud.initial.conf /etc/nginx/sites-available/feedforge.cloud
# sudo ln -sf /etc/nginx/sites-available/feedforge.cloud /etc/nginx/sites-enabled/
# sudo rm -f /etc/nginx/sites-enabled/default
# sudo nginx -t && sudo systemctl reload nginx
#
# STEP 2 — Issue certificate (Certbot edits this file automatically):
# sudo certbot --nginx -d feedforge.cloud -d www.feedforge.cloud
#
# App runs on http://127.0.0.1:3005 — Nginx proxies public traffic to it.

server {
    listen 80;
    listen [::]:80;
    server_name feedforge.cloud www.feedforge.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}
